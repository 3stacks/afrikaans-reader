name: Build and Push

on:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t afrikaans-reader:latest .

      - name: Tag and push to registry
        run: |
          # Use host.docker.internal to reach the registry from inside Docker
          docker tag afrikaans-reader:latest host.docker.internal:5050/afrikaans-reader:latest
          docker push host.docker.internal:5050/afrikaans-reader:latest
